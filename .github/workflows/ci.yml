name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Lint deve ser rápido e falhar primeiro se houver problema óbvio
      - name: Lint (ruff)
        run: ruff check src tests

      # Type check é o próximo gate - invariantes estáticas antes de execução
      - name: Type check (mypy)
        run: mypy src

      # Finalmente testes com cobertura; --cov-fail-under=80 está no pyproject.toml
      - name: Tests with coverage
        run: pytest

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
